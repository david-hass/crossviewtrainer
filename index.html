<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossViewTrainer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>CrossViewTrainer</h1>
        <p>Both views share the same dots. One view has exactly one extra dot.</p>
      </div>
      <a class="github-link" href="https://github.com/david-hass/crossviewtrainer" target="_blank" rel="noopener noreferrer" aria-label="Open GitHub repository">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82a7.57 7.57 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
        </svg>
      </a>
    </header>

    <section class="trainer" aria-label="Cross view training panels">
      <article class="panel-wrap">
        <h2>Left View</h2>
        <canvas id="leftCanvas" width="760" height="760" aria-label="Left dot field"></canvas>
      </article>
      <article class="panel-wrap">
        <h2>Right View</h2>
        <canvas id="rightCanvas" width="760" height="760" aria-label="Right dot field"></canvas>
      </article>
    </section>

    <section class="controls" aria-label="Trainer controls">
      <button id="newRoundBtn" type="button">New Round</button>
      <button id="solveBtn" type="button">Solve</button>

      <label for="speedRange">Rotation Speed</label>
      <input id="speedRange" type="range" min="0.05" max="0.6" step="0.01" value="0.3">

      <output id="status" role="status" aria-live="polite">Click the exact cell (ring + sector), then press Solve.</output>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
